<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timeline · Eadria</title>
  <meta name="description" content="Timeline of Delmara and Eadria.">
  <link rel="stylesheet" href="style.css">
  <style>
    .timeline-list { margin-top: 2rem; border-left: 2px solid rgba(123, 79, 47, 0.45); padding-left: 1.5rem; }
    .timeline-era { position: relative; margin: 0 0 2rem; }
    .timeline-era::before { content: ""; position: absolute; left: calc(-1.5rem - 7px); top: 0.35rem; width: 12px; height: 12px; border-radius: 50%; background: #7b4f2f; }
    .timeline-era h2 { margin-bottom: 0.35rem; }
    .timeline-events { margin-top: 0.85rem; }
    .timeline-event { position: relative; margin: 0.65rem 0 0 1rem; }
    .timeline-event::before { content: ""; position: absolute; left: -1.15rem; top: 0.45rem; width: 7px; height: 7px; border-radius: 50%; background: rgba(123, 79, 47, 0.7); }
    .timeline-event strong { display: block; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="index.html">Eadria</a>
      <details class="nav-menu">
        <summary class="menu-toggle" aria-label="Open navigation">☰</summary>
        <div class="nav-links">
          <a href="geography.html">Geography</a>
          <a href="races/index.html">Races</a>
          <a href="peoples/index.html">Peoples</a>
          <a href="groups/index.html">Groups &amp; Orders</a>
          <a href="books/index.html">Books</a>
          <a href="timeline.html">Timeline</a>
        </div>
      </details>
    </nav>
  </header>

  <main class="page-shell">
    <article class="article">
      <h1 class="page-title">Timeline</h1>
      <p class="lede">A beginning chronology of Delmara, from the remembered age of Aurumveldor to the present Current Era.</p>
      <div id="delmara-timeline" class="timeline-list" aria-label="Timeline of Delmara"></div>
    </article>
  </main>

  <script>
    const timelineData = {
      eras: [
        { name: 'Aurumveldian Era', summary: 'The age of Aurumveldor, before the Great Deluge remade Delmara.', events: [
          { name: 'Keepers Established', summary: 'The Keepers of Volelia are founded in the elder age of Delmara.' },
          { name: 'The Great Deluge', summary: 'The final great event of the Aurumveldian Era. The Ondris River becomes the Ondris Sea, and Dughfaldur is drowned beneath its waters.' }
        ]},
        { name: 'Current Era', summary: 'The present age of Delmara after the flood and remaking of the old world.', events: [
          { name: 'Axont Established', summary: 'Axont rises in the Current Era.' },
          { name: 'Klad Settled', summary: 'The Klad establish their settlement north of Lake Imryll.' }
        ]}
      ]
    };

    const container = document.getElementById('delmara-timeline');
    container.innerHTML = timelineData.eras.map(function(era) {
      const events = (era.events || []).map(function(event) {
        return '<div class="timeline-event"><strong>' + event.name + '</strong><span>' + event.summary + '</span></div>';
      }).join('');
      return '<section class="timeline-era"><h2>' + era.name + '</h2><p>' + era.summary + '</p><div class="timeline-events">' + events + '</div></section>';
    }).join('');
  </script>
  <script src="scripts/nav.js"></script>
  <script src="scripts/glossary-links.js"></script>
  <script src="scripts/pronunciation.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timeline · Eadria</title>
  <meta name="description" content="Timeline of Delmara and Eadria.">
  <link rel="stylesheet" href="style.css">
  <style>
    #delmara-timeline .timeline-label {
      display: block;
      max-width: 9.5rem;
      white-space: normal;
      line-height: 1.15;
    }
    #delmara-timeline .timeline-label.era {
      font-weight: 700;
      font-size: 1.05rem;
    }
    #delmara-timeline .timeline-label.event {
      font-weight: 500;
      font-size: 0.82rem;
    }
  </style>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/modules/timeline.js"></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="index.html">Eadria</a>
      <details class="nav-menu">
        <summary class="menu-toggle" aria-label="Open navigation">☰</summary>
        <div class="nav-links">
          <a href="geography.html">Geography</a>
          <a href="peoples/index.html">Peoples</a>
          <a href="groups/index.html">Groups &amp; Orders</a>
          <a href="timeline.html">Timeline</a>
        </div>
      </details>
    </nav>
  </header>

  <main class="page-shell">
    <article class="article">
      <a class="back-link" href="index.html">← Home</a>
      <h1 class="page-title">Timeline</h1>
      <p class="lede">A beginning chronology of Delmara, from the remembered age of Aurumveldor to the present Current Era.</p>
      <div id="delmara-timeline" class="image-plate" aria-label="Timeline of Delmara" style="height: 820px;"></div>
    </article>
  </main>

  <script>
    fetch('data/timeline-delmara.json')
      .then(function(response) { return response.json(); })
      .then(function(data) {
        const points = [];
        data.eras.forEach(function(item) {
          points.push({
            name: item.name,
            description: item.summary,
            labelType: 'era',
            marker: { radius: 10 }
          });
          if (item.events) {
            item.events.forEach(function(event) {
              points.push({
                name: event.name,
                description: event.summary,
                labelType: 'event',
                marker: { radius: 5 }
              });
            });
          }
        });

        Highcharts.chart('delmara-timeline', {
          chart: {
            type: 'timeline',
            inverted: true,
            backgroundColor: 'transparent',
            spacingTop: 80,
            spacingRight: 20,
            spacingBottom: 40,
            spacingLeft: 20
          },
          credits: { enabled: false },
          title: { text: data.title, style: { display: 'none' } },
          xAxis: { visible: false },
          yAxis: { visible: false },
          legend: { enabled: false },
          tooltip: {
            useHTML: true,
            borderRadius: 4,
            padding: 10,
            style: { fontSize: '0.9rem', lineHeight: '1.25' },
            pointFormat: '<strong>{point.name}</strong><br><span style="line-height:1.25">{point.description}</span>'
          },
          series: [{
            data: points,
            colorByPoint: false,
            color: '#7b4f2f',
            lineWidth: 2,
            dataLabels: {
              useHTML: true,
              allowOverlap: false,
              crop: false,
              overflow: 'allow',
              connectorWidth: 1,
              formatter: function() {
                return '<span class="timeline-label ' + this.point.labelType + '">' + this.point.name + '</span>';
              },
              style: {
                textOutline: 'none',
                fontFamily: 'Georgia, serif'
              }
            }
          }]
        });
      });
  </script>
</body>
</html>

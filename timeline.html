<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timeline · Eadria</title>
  <meta name="description" content="Timeline of Delmara and Eadria.">
  <link rel="stylesheet" href="style.css">
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/modules/timeline.js"></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="index.html">Eadria</a>
      <div class="nav-links">
        <a href="geography.html">Geography</a>
        <a href="peoples/index.html">Peoples</a>
        <a href="groups/index.html">Groups &amp; Orders</a>
        <a href="timeline.html">Timeline</a>
      </div>
    </nav>
  </header>

  <main class="page-shell">
    <article class="article">
      <a class="back-link" href="index.html">← Home</a>
      <h1 class="page-title">Timeline</h1>
      <p class="lede">A beginning chronology of Delmara, from the remembered age of Aurumveldor to the present Post-Deluge age.</p>
      <div id="delmara-timeline" class="image-plate" aria-label="Timeline of Delmara" style="height: 720px;"></div>
    </article>
  </main>

  <script>
    fetch('data/timeline-delmara.json')
      .then(function(response) { return response.json(); })
      .then(function(data) {
        const points = [];
        data.eras.forEach(function(item) {
          points.push({
            name: item.name,
            label: item.name,
            description: item.summary,
            marker: { radius: item.type === 'major-event' ? 8 : 12 },
            dataLabels: { style: { fontSize: item.type === 'major-event' ? '0.95rem' : '1.15rem', fontWeight: '700' } }
          });
          if (item.events) {
            item.events.forEach(function(event) {
              points.push({
                name: event.name,
                label: event.name,
                description: event.summary,
                marker: { radius: 5 },
                dataLabels: { style: { fontSize: '0.82rem', fontWeight: '500' } }
              });
            });
          }
        });

        Highcharts.chart('delmara-timeline', {
          chart: {
            type: 'timeline',
            inverted: true,
            backgroundColor: 'transparent',
            spacing: [20, 20, 20, 20]
          },
          credits: { enabled: false },
          title: { text: data.title, style: { display: 'none' } },
          xAxis: { visible: false },
          yAxis: { visible: false },
          legend: { enabled: false },
          tooltip: {
            style: { fontSize: '0.9rem' },
            pointFormat: '<b>{point.name}</b><br>{point.description}'
          },
          series: [{
            data: points,
            colorByPoint: false,
            color: '#7b4f2f',
            lineWidth: 2,
            dataLabels: {
              allowOverlap: false,
              connectorWidth: 1,
              color: '#2c2118',
              style: {
                textOutline: 'none',
                fontFamily: 'Georgia, serif'
              }
            }
          }]
        });
      });
  </script>
</body>
</html>
